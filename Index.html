<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Amor - Site Personalizado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="hearts">💕</div>
        <h1>Nosso Amor</h1>
        <p class="subtitle">Cada dia ao seu lado é especial</p>
    </div>

    <div class="card">
        <div class="card-title">
            <span>📅</span> Data do Início do Nosso Amor
        </div>
        <div class="input-container">
            <input type="date" id="dataInicio">
        </div>
    </div>

    <div class="card">
        <div class="card-title">
            <span>📸</span> Nossas Memórias
        </div>
        <div class="carousel">
            <button class="nav-btn prev" id="prevBtn">❮</button>
            <div class="carousel-view">
                <img id="displayImg" src="https://via.placeholder.com/300x200?text=Sua+Foto+Aqui" alt="Memória">
                <p id="fotoLegenda">Foto 1</p>
            </div>
            <button class="nav-btn next" id="nextBtn">❯</button>
        </div>
        
        <div class="upload-group">
            <button class="btn-sm" onclick="triggerInput(0)">+ Foto 1</button>
            <button class="btn-sm" onclick="triggerInput(1)">+ Foto 2</button>
            <button class="btn-sm" onclick="triggerInput(2)">+ Foto 3</button>
        </div>
        
        <input type="file" id="file0" class="hidden" accept="image/*">
        <input type="file" id="file1" class="hidden" accept="image/*">
        <input type="file" id="file2" class="hidden" accept="image/*">
    </div>

    <div class="card">
        <div class="card-title">
            <span>💌</span> Mensagem Especial
        </div>
        <textarea id="mensagem" placeholder="Escreva uma mensagem de amor..."></textarea>
    </div>

    <button class="btn-main" id="btnGerar">
        ✨ Gerar Link para Compartilhar ✨
    </button>
    
    <p class="info-footer">O link conterá todas as suas personalizações!</p>
    <p class="signature">Feito com 💕 para celebrar o amor</p>
</div>

<script src="script.js"></script>
</body>
</html>
